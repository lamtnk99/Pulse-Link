name: Build iOS and upload to App Store Connect

on:
  workflow_dispatch:
  push:
    branches: ["prod"]

permissions:
  contents: read

concurrency:
  group: ios-app-store-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: [self-hosted, macOS, personal]
    timeout-minutes: 60
    env:
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID || 'NZK5L3G8VJ' }}
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'com.pulselinkvn.app' }}
      IOS_PROFILE_NAME: ${{ vars.IOS_PROFILE_NAME || 'pulselinkvn-appstore-profile' }}
      LARAVEL_API_BASE_URL: ${{ vars.LARAVEL_API_BASE_URL || 'https://api.pulselink.asia' }}
      PUBLIC_WEB_BASE_URL: ${{ vars.PUBLIC_WEB_BASE_URL || 'https://api.pulselink.asia' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          CERTIFICATE: ${{ secrets.APPSTORE_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPSTORE_CERT_PASSWORD }}
          FIREBASE_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          PROFILE: ${{ secrets.MOBILEPROVISION_BASE64 }}
          API_KEY_ID: ${{ secrets.AUTH_KEY }}
          API_ISSUER_ID: ${{ secrets.API_ISSUER }}
          API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          for value in \
            "$CERTIFICATE" \
            "$CERTIFICATE_PASSWORD" \
            "$FIREBASE_PLIST" \
            "$KEYCHAIN_PASSWORD" \
            "$PROFILE" \
            "$API_KEY_ID" \
            "$API_ISSUER_ID" \
            "$API_PRIVATE_KEY"; do
            if [ -z "$value" ]; then
              echo "A required App Store secret is missing."
              exit 1
            fi
          done

      - name: Inject Firebase iOS configuration
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.GOOGLE_SERVICE_INFO_BASE64 }}
        run: |
          mkdir -p ios/Runner
          echo -n "$GOOGLE_SERVICE_INFO" | base64 --decode -o ios/Runner/GoogleService-Info.plist

      - name: Ensure Flutter SDK is available
        run: |
          CUSTOM_PATH="$HOME/Documents/FlutterSDK/flutter"
          DOWNLOAD_PATH="$HOME/flutter"

          if [ -x "$CUSTOM_PATH/bin/flutter" ]; then
            echo "$CUSTOM_PATH/bin" >> "$GITHUB_PATH"
          elif [ -x "$DOWNLOAD_PATH/bin/flutter" ]; then
            echo "$DOWNLOAD_PATH/bin" >> "$GITHUB_PATH"
          else
            git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$DOWNLOAD_PATH"
            "$DOWNLOAD_PATH/bin/flutter" precache --ios
            echo "$DOWNLOAD_PATH/bin" >> "$GITHUB_PATH"
          fi

      - name: Install Flutter and CocoaPods dependencies
        env:
          LANG: en_US.UTF-8
        run: |
          flutter --version
          flutter clean
          flutter pub get
          cd ios
          pod install --repo-update

      - name: Install signing certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPSTORE_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPSTORE_CERT_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          INSTALLED_PROFILE="$HOME/Library/MobileDevice/Provisioning Profiles/pulse-link.mobileprovision"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          
          curl -s -O https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true
          curl -s -O https://www.apple.com/certificateauthority/AppleWWDRCAG4.cer
          security import AppleWWDRCAG4.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$(dirname "$INSTALLED_PROFILE")"
          cp "$PROFILE_PATH" "$INSTALLED_PROFILE"

      - name: Create export options
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        run: |
          flutter build ipa \
            --release \
            --build-number="${{ github.run_number }}" \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define=LARAVEL_API_BASE_URL="$LARAVEL_API_BASE_URL" \
            --dart-define=PUBLIC_WEB_BASE_URL="$PUBLIC_WEB_BASE_URL" \
            --dart-define=FIREBASE_PUSH_ENABLED=true

      - name: Upload IPA to App Store Connect
        env:
          API_KEY: ${{ secrets.AUTH_KEY }}
          API_ISSUER: ${{ secrets.API_ISSUER }}
          API_KEY_P8_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          API_KEY_DIRECTORY="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$API_KEY_DIRECTORY"
          echo -n "$API_KEY_P8_BASE64" | base64 --decode -o "$API_KEY_DIRECTORY/AuthKey_${API_KEY}.p8"

          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "IPA file was not generated."
            exit 1
          fi

          xcrun altool \
            --upload-app \
            --type ios \
            -f "$IPA_PATH" \
            --apiKey "$API_KEY" \
            --apiIssuer "$API_ISSUER"

      - name: Clean signing materials
        if: ${{ always() }}
        env:
          API_KEY: ${{ secrets.AUTH_KEY }}
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/pulse-link.mobileprovision"
          rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY}.p8"
          rm -f ios/Runner/GoogleService-Info.plist
          security list-keychains -d user -s login.keychain-db || true
          security default-keychain -s login.keychain-db || true
