name: pulse_link
description: Pulse Link mobile app for blood donation, emergency SOS dispatch, and hero pass identity.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.6.0
  collection: ^1.18.0
  cupertino_icons: ^1.0.8
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0
  http: ^1.2.2
  intl: ^0.19.0
  just_audio: ^0.9.42
  qr_flutter: ^4.1.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
